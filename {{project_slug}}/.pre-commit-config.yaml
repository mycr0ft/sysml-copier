repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: sysml-style-format
        name: sysml-style format
        entry: sysml-style format
        language: system
        files: \.sysml$
        pass_filenames: true

      - id: sysml-style-check
        name: sysml-style check
        entry: sysml-style check
        language: system
        files: \.sysml$
        pass_filenames: true

      - id: sysmlpy-check
        name: sysmlpy format check
        entry: sysmlpy --check
        language: system
        files: \.sysml$
        pass_filenames: true
